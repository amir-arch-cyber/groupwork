<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amir</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <header class="relative bg-[#1E1B2A] text-white overflow-hidden min-h-[600px] flex flex-col justify-between">
  <img src="./imagesamir/background (1).png" alt="Background" class="absolute inset-0 w-full h-full object-cover object-center z-0 pointer-events-none">

  <div class="relative z-10 w-full border-b border-white/10">
    <div class="max-w-[1200px] mx-auto px-4 h-20 flex items-center justify-between">
   
      <a href="#" class="text-xl md:text-2xl font-black tracking-wider text-white flex items-center">
        CREATE<span class="text-[#7761EC]">X</span>
      </a>

      <button type="button" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-white/5 md:hidden focus:outline-none">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <nav class="hidden md:flex items-center space-x-8 lg:space-x-10 text-sm lg:text-base font-semibold text-gray-300">
        <a href="#" class="hover:text-white flex items-center gap-1 transition-colors">
          Services
          <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </a>
        <a href="#" class="text-white border-b-2 border-[#7761EC] pb-1 transition-colors">Case Studies</a>
        <a href="#" class="hover:text-white transition-colors">About Us</a>
        <a href="#" class="hover:text-white transition-colors">Blog</a>
        <a href="#" class="hover:text-white transition-colors">Contacts</a>
      </nav>

      <div class="hidden md:block">
        <a href="#" class="inline-block bg-[#7761EC] hover:bg-[#624de3] text-white text-sm lg:text-base font-bold px-6 py-3 rounded-md transition-all shadow-lg shadow-indigo-600/20">
          Talk to a human
        </a>
      </div>
    </div>
  </div>

  <div class="relative z-10 flex-grow flex items-center justify-center py-16 md:py-24">
    <div class="w-full max-w-[820px] mx-auto px-4 flex flex-col items-center text-center">
      
      <nav class="flex items-center space-x-2 text-xs md:text-sm text-gray-400 mb-6 md:mb-8 font-medium">
        <a href="#" class="hover:text-white transition-colors flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
          </svg>
        </a>
        <span class="text-gray-600">/</span>
        <span class="text-white">Case Studies</span>
      </nav>

      <h1 class="text-4xl sm:text-5xl md:text-6xl font-black tracking-tight text-white mb-6">
        Case Studies
      </h1>

      <p class="text-gray-400 text-sm sm:text-base md:text-lg leading-relaxed max-w-2xl mb-10 md:mb-12 font-normal opacity-90">
        We help our clients get better results with our creative and data-driven approach to online advertising. View our case study portfolio and learn more about the process that sets us apart.
      </p>

      <form class="w-full max-w-[600px] text-left">
        <label for="hero-email" class="block text-xs sm:text-sm font-medium text-gray-300 mb-2">
          Email
        </label>
        <div class="flex flex-col sm:flex-row w-full gap-3 sm:gap-0 rounded-md overflow-hidden bg-white/5 border border-white/10 focus-within:border-[#7761EC] transition-all">
          <input 
            type="email" 
            id="hero-email"
            placeholder="Your working email" 
            class="w-full bg-transparent px-4 py-3.5 text-sm sm:text-base text-white placeholder-gray-500 focus:outline-none"
            required
          >
          <button 
            type="submit" 
            class="w-full sm:w-auto bg-[#7761EC] hover:bg-[#624de3] text-white px-8 py-3.5 text-sm sm:text-base font-bold transition-colors whitespace-nowrap"
          >
            Subscribe
          </button>
        </div>
      </form>

    </div>
  </div>
</header>
    
</body>
</html>
