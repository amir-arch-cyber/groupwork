<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    
<div class="w-full relative min-h-[450px] sm:min-h-[500px] md:min-h-[550px] flex flex-col justify-between antialiased font-['Ubuntu',_sans-serif]">
    
    <!-- КОНТЕНЕР ДЛЯ ЗАДНЕГО ФОНА -->
    <div class="absolute inset-0 w-full h-full z-0 select-none pointer-events-none overflow-hidden">
        <!-- Картинка заднего фона -->
        <img src="./smimg/image (34).png" alt="" class="w-full h-full object-cover">
        <!-- Темный оверлей для читаемости текста -->
        <div class="absolute inset-0 bg-[#1E212C]/75"></div>
    </div>

    <header class="w-full relative z-10 bg-transparent">
        <div class="max-w-[1230px] mx-auto px-4 sm:px-6 lg:px-8 h-20 sm:h-24 flex items-center justify-between">
            
            <!-- Логотип и Главное меню -->
            <div class="flex items-center gap-10 lg:gap-16">
                <!-- Логотип (Буква X подсвечена фиолетовым) -->
                <a href="#" class="text-2xl font-black tracking-wider uppercase text-white shrink-0">
<img src="./smimg/logo.png" alt="">
                </a>
                
                <!-- Меню навигации -->
                <nav class="hidden lg:flex items-center gap-8 text-sm font-bold text-white/60">
                    <a href="#" class="hover:text-white transition-colors flex items-center gap-1">
                        Services
                        <svg class="w-3 h-3 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                        </svg>
                    </a>
                    <a href="#" class="hover:text-white transition-colors">Case Studies</a>
                    <a href="#" class="hover:text-white transition-colors">About Us</a>
                    <a href="#" class="text-white transition-colors ">Blog</a>
                    <a href="#" class="hover:text-white transition-colors">Contacts</a>
                </nav>
            </div>

            <!-- Правая часть: Кнопка действия -->
            <div class="flex items-center gap-4 shrink-0">
                <a href="#" class="hidden sm:inline-block px-7 py-3.5 bg-[#7772F1] hover:bg-[#5f59e0] text-white text-xs font-bold uppercase tracking-wider rounded transition-colors whitespace-nowrap">
                    Talk to a human
                </a>

                <!-- Кнопка мобильного меню (Бургер) -->
                <button type="button" class="lg:hidden p-2 text-white hover:text-[#7772F1]" aria-label="Open Menu">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>

        </div>
    </header>

    <div class="w-full relative z-10 flex-1 flex items-center py-12 sm:py-16 md:py-20 px-4 sm:px-6 lg:px-8">
        <div class="max-w-[1000px] mx-auto text-center">
            
            <!-- Хлебные крошки (Breadcrumbs) -->
            <nav class="flex items-center justify-center gap-2 text-xs text-white/60 mb-5 font-normal">
                <!-- Иконка домика -->
                <a href="#" class="hover:text-white transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                </a>
                <span class="text-white/30"></span>
                <a href="#" class="hover:text-white transition-colors">Blog</a>
                <span class="text-white/30"></span>
                <span class="text-white/40 truncate max-w-[200px] sm:max-w-none">How to Increase Your ROI Through Scientific SEM?</span>
            </nav>

            <!-- Главный заголовок статьи -->
            <h1 class="text-2xl sm:text-4xl md:text-[44px] lg:text-[48px] font-bold text-white tracking-tight leading-tight max-w-4xl mx-auto">
                How to Maximize Your ROI Through Scientific SEM?
            </h1>

        </div>
    </div>

</div>

</body>
</html>
